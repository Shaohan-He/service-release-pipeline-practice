apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-demo-service-canary
  labels:
    app: release-demo-service
    component: api
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: release-demo-service
      component: api
      track: canary
  template:
    metadata:
      labels:
        app: release-demo-service
        component: api
        track: canary
    spec:
      containers:
        - name: app
          image: ghcr.io/shaohan-he/release-demo-service:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: production-canary
            - name: APP_VERSION
              value: v1.0.0
            - name: GIT_SHA
              value: unknown
            - name: IMAGE_TAG
              value: v1.0.0
            - name: BUILD_TIME
              value: unknown
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
