apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-demo-service
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: app
          env:
            - name: APP_ENV
              value: staging
            - name: APP_VERSION
              value: v1.0.0
            - name: GIT_SHA
              value: unknown
            - name: IMAGE_TAG
              value: staging-latest
            - name: BUILD_TIME
              value: unknown
